spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tiam}
    username: ${DB_USERNAME:tiam}
    password: ${DB_PASSWORD:tiam}
  jpa:
    show-sql: true
  flyway:
    enabled: true

tiam:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-256-bits}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.tiam: DEBUG
    org.springframework.security: DEBUG
