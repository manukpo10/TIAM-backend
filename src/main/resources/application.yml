server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    # Include null fields in responses — the frontend was built expecting explicit
    # nulls (e.g. ownerId: null for TIAM exercises). Omitting them broke null checks.
    default-property-inclusion: always
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

tiam:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN:}
    webhook-secret: ${MP_WEBHOOK_SECRET:}
  plans:
    professional-monthly-amount: 20000
    professional-annual-amount: 200000
    back-url-success: ${MP_BACK_URL_SUCCESS:http://localhost:5173/subscription/success}
    back-url-failure: ${MP_BACK_URL_FAILURE:http://localhost:5173/subscription/failure}
    back-url-pending: ${MP_BACK_URL_PENDING:http://localhost:5173/subscription/pending}
    notification-url: ${MP_NOTIFICATION_URL:}
