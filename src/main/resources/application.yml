server:
  port: ${PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Supabase's session-mode pooler caps total clients at 15. Render deploys
      # without downtime, so the old and new instances briefly run at once — two
      # pools must fit within that cap. Keep this small (default is 10, which
      # made 10+10=20 > 15 and broke every deploy with EMAXCONNSESSION).
      maximum-pool-size: ${DB_POOL_SIZE:3}
      minimum-idle: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    # Include null fields in responses — the frontend was built expecting explicit
    # nulls (e.g. ownerId: null for TIAM exercises). Omitting them broke null checks.
    default-property-inclusion: always
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
  bucket: ${SUPABASE_BUCKET:exercise-images}

tiam:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN:}
    webhook-secret: ${MP_WEBHOOK_SECRET:}
  plans:
    professional-monthly-amount: 20000
    professional-annual-amount: 200000
    back-url-success: ${MP_BACK_URL_SUCCESS:http://localhost:5173/subscription/success}
    back-url-failure: ${MP_BACK_URL_FAILURE:http://localhost:5173/subscription/failure}
    back-url-pending: ${MP_BACK_URL_PENDING:http://localhost:5173/subscription/pending}
    notification-url: ${MP_NOTIFICATION_URL:}
  challenge:
    back-url: ${CHALLENGE_BACK_URL:http://localhost:5173/desafio-30-dias/exito}
  whatsapp:
    access-token: ${WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    verify-token: ${WHATSAPP_VERIFY_TOKEN:}
    app-secret: ${WHATSAPP_APP_SECRET:}
    desafio-play-base-url: ${DESAFIO_PLAY_BASE_URL:http://localhost:5173/desafio}
    sales-page-url: ${DESAFIO_SALES_URL:http://localhost:5173/desafio-30-dias}
