version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: tiam-postgres
    environment:
      POSTGRES_DB: tiam
      POSTGRES_USER: tiam
      POSTGRES_PASSWORD: tiam
    ports:
      # Host port is overridable (set DB_HOST_PORT in .env) to avoid clashing
      # with a native Postgres install already using 5432. Container port stays 5432.
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - tiam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiam -d tiam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tiam-postgres-data:
